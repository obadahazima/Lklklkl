kind = "mobile"
previewPath = "/mobile/"
title = "نظام الحسابات - موبايل"
version = "1.0.0"
id = "artifacts/finance-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21672

[services.development]
run = "pnpm --filter @workspace/finance-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/finance-mobile", "run", "serve" ]

[services.env]
PORT = "21672"
BASE_PATH = "/mobile/"
